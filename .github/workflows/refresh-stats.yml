# Daily refresh of stats.json from the profile's terminal.svg.
name: refresh-stats

on:
  schedule:
    - cron: "17 6 * * *" # Daily 06:17 UTC (commits only when metrics actually change)
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: refresh-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Rebuild stats.json from profile SVG
        run: node .github/scripts/build-stats.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- stats.json; then
            echo "stats.json unchanged — nothing to commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git commit -m "chore: refresh stats.json from profile SVG"
          git push
